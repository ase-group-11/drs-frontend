name: Deploy Frontend Web to K8s

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run tests
        working-directory: apps/web
        env:
          CI: true
        run: npm test -- --coverage --watchAll=false

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/ase-group-11/drs-frontend:${{ github.sha }}
            ghcr.io/ase-group-11/drs-frontend:latest
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
            REACT_APP_HEALTH_URL=${{ secrets.REACT_APP_HEALTH_URL }}
            REACT_APP_MAPBOX_TOKEN=${{ secrets.REACT_APP_MAPBOX_TOKEN }}

      - name: Deploy to K8s
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig.yaml
          KUBECONFIG=kubeconfig.yaml kubectl set image deployment/drs-frontend \
            drs-frontend=ghcr.io/ase-group-11/drs-frontend:${{ github.sha }} \
            -n drs
