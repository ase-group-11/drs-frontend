# Frontend — serves React app on HTTPS port 443
# Place this file at: /etc/nginx/sites-available/drs-frontend
# Then: sudo ln -s /etc/nginx/sites-available/drs-frontend /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name drs-ie.duckdns.org;

    # SSL cert — reuse the same cert already obtained for the backend
    ssl_certificate     /etc/letsencrypt/live/drs-ie.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drs-ie.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/drs-frontend;
    index index.html;

    # React Router — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name drs-ie.duckdns.org;
    return 301 https://$host$request_uri;
}
